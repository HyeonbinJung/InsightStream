services:
  kafka:
    image: apache/kafka:3.7.0
    container_name: insight-kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,PLAINTEXT_HOST://:29092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
    healthcheck:
      test: ["CMD-SHELL", "bash -lc '/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1'"]
      interval: 10s
      timeout: 5s
      retries: 30

  postgres:
    image: pgvector/pgvector:pg16
    container_name: insight-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-insightstream}
      POSTGRES_USER: ${POSTGRES_USER:-insight}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-insight}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-insight} -d ${POSTGRES_DB:-insightstream}"]
      interval: 10s
      timeout: 5s
      retries: 20

  backend:
    build: ./backend
    container_name: insight-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      DO_MODEL_ACCESS_KEY: "${DO_MODEL_ACCESS_KEY:-}"
      DO_INFERENCE_MODEL: "${DO_INFERENCE_MODEL:-llama3-8b-instruct}"
      INSIGHT_LOG_TOPIC: "logs.raw"
      INSIGHT_ALERT_TOPIC: "alerts"
      INSIGHT_METRIC_TOPIC: "logs.metrics.window"
      POSTGRES_DB: "${POSTGRES_DB:-insightstream}"
      POSTGRES_USER: "${POSTGRES_USER:-insight}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-insight}"
      POSTGRES_HOST: "postgres"
      POSTGRES_PORT: "5432"
      OTEL_EXPORTER_OTLP_ENABLED: "${OTEL_EXPORTER_OTLP_ENABLED:-false}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}"
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy

  dashboard:
    build: ./dashboard
    container_name: insight-dashboard
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_BACKEND_URL: "${NEXT_PUBLIC_BACKEND_URL:-http://localhost:8080}"
    depends_on:
      - backend
